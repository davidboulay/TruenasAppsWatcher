name: Build & Release

# The macOS app builds on every push (that's this repo's compile check for
# Swift). On a version tag, both platforms build and a single release is
# published carrying the COSMIC applet binary + desktop file and the zipped
# macOS menu bar app.
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build (release, universal)
        working-directory: macos
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble .app bundle
        working-directory: macos
        run: ./scripts/make_app.sh

      - name: Build styled .dmg
        working-directory: macos
        run: |
          # The runner's python is PEP 668 "externally managed".
          pip3 install --break-system-packages dmgbuild
          ./scripts/make_dmg.sh

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: macos
          path: macos/dist/TrueNAS-Apps-Watcher.dmg

  linux:
    if: startsWith(github.ref, 'refs/tags/')
    # Match Pop!_OS 24.04's glibc so the binary runs on the target.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libdbus-1-dev \
            libpulse-dev libpipewire-0.3-dev libinput-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cosmic

      - name: Build (release)
        working-directory: cosmic
        run: cargo build --release --locked

      - name: Package .deb
        working-directory: cosmic
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build

      - name: Stage assets
        run: |
          mkdir -p dist
          cp cosmic/target/release/cosmic-applet-truenas-apps dist/
          cp cosmic/data/com.github.davidboulay.CosmicAppletTruenasApps.desktop dist/
          # Stable asset name so releases/latest/download/… always works.
          cp cosmic/target/debian/truenas-apps-watcher_*.deb dist/truenas-apps-watcher_amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
